name: Cache Busting Deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inject Versioning (Cache Busting)
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "Busting cache with version: $VERSION"
          
          # Replace placeholder in ALL HTML files
          find . -name "*.html" -exec sed -i "s/{{VERSION}}/$VERSION/g" {} +
          
          # Append version to major assets in CSS
          sed -i "s/2001_locmelis.jpg/2001_locmelis.jpg?v=$VERSION/g" style.css
          sed -i "s/bird.gif/bird.gif?v=$VERSION/g" style.css
          
          # Append version to JSON feed in player.js and video_player.js
          sed -i "s/sounds.json/sounds.json?v=$VERSION/g" player.js
          sed -i "s/videos.json/videos.json?v=$VERSION/g" video_player.js

          # Append version to image gallery scripts
          sed -i "s/photos.json/photos.json?v=$VERSION/g" photos.js
          sed -i "s/photos.json/photos.json?v=$VERSION/g" photos_detail.js
          sed -i "s/photos.js/photos.js?v=$VERSION/g" photos.html
          sed -i "s/photos_detail.js/photos_detail.js?v=$VERSION/g" photos_detail.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repository (which now has the injected versions)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
