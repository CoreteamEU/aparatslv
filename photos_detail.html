<!DOCTYPE html>
<html lang="lv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grupa Aparāts - Album Viewer</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="canonical" href="https://aparats.lv/photos_detail.html">
    <link rel="stylesheet" href="style.css?v={{VERSION}}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VW5WB2EW5R"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-VW5WB2EW5R');
    </script>
</head>

<body>
    <div class="background-image"></div>
    <div class="background-grid"></div>

    <nav class="top-nav">
        <a href="photos.html" class="nav-link">&larr; Visas galerijas</a>
    </nav>

    <main class="container gallery-container">
        <div class="glass-card full-width">
            <h1 class="glitch" id="album-title" data-text="Ielādē...">Ielādē...</h1>

            <div id="photos-grid" class="photos-grid">
                <div class="loading-text">Ielādē bildes...</div>
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <span class="close-btn" onclick="closeLightbox()">&times;</span>
            <button class="nav-btn prev-btn" onclick="changeImage(-1)">&#10094;</button>
            <img id="lightbox-img" src="" alt="Album View">
            <button class="nav-btn next-btn" onclick="changeImage(1)">&#10095;</button>
        </div>
        <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>

    <script src="photos_detail.js?v={{VERSION}}"></script>
</body>

</html>
